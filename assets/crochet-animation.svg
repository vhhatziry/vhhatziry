<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180" role="img" aria-label="Crochet meets code animation">
  <title>Crochet meets code</title>
  <defs>
    <linearGradient id="yarn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6FA5"/>
      <stop offset="1" stop-color="#E4405F"/>
    </linearGradient>
    <style>
      .mono { font-family: 'JetBrains Mono','Fira Code',Consolas,monospace; }
      .thread { stroke: url(#yarn); stroke-width: 3; fill: none; stroke-linecap: round; }
      .stitch { fill: none; stroke: url(#yarn); stroke-width: 3; stroke-linecap: round;
                stroke-dasharray: 26; stroke-dashoffset: 26;
                animation: draw 4.2s ease-in-out infinite; }
      .caret { fill: #E4405F; animation: blink 1s steps(1) infinite; }
      .label { fill: #9aa0a6; }
      .pink  { fill: #E4405F; }
      @keyframes draw  { 0% {stroke-dashoffset:26} 45%,100% {stroke-dashoffset:0} }
      @keyframes blink { 0%,50% {opacity:1} 51%,100% {opacity:0} }
      @keyframes spin  { to { transform: rotate(360deg); } }
      @keyframes bob   { 0%,100% {transform:translateY(0)} 50% {transform:translateY(-5px)} }
      @keyframes flow  { to { stroke-dashoffset: -40; } }
      .ball  { transform-box: fill-box; transform-origin: center; animation: spin 9s linear infinite; }
      .hook  { animation: bob 2.4s ease-in-out infinite; }
      .feed  { stroke: url(#yarn); stroke-width: 3; fill: none; stroke-linecap: round;
               stroke-dasharray: 8 6; animation: flow 1.2s linear infinite; }
    </style>
  </defs>

  <!-- comment header -->
  <text x="40" y="42" class="mono label" font-size="17">// a crochet pattern is just pseudocode</text>

  <!-- chain of stitches drawn along the baseline (left -> right) -->
  <g transform="translate(40,96)">
    <path class="stitch" d="M0 0 q13 -14 26 0"   style="animation-delay:0s"/>
    <path class="stitch" d="M26 0 q13 -14 26 0"  style="animation-delay:.3s"/>
    <path class="stitch" d="M52 0 q13 -14 26 0"  style="animation-delay:.6s"/>
    <path class="stitch" d="M78 0 q13 -14 26 0"  style="animation-delay:.9s"/>
    <path class="stitch" d="M104 0 q13 -14 26 0" style="animation-delay:1.2s"/>
    <path class="stitch" d="M130 0 q13 -14 26 0" style="animation-delay:1.5s"/>
    <path class="stitch" d="M156 0 q13 -14 26 0" style="animation-delay:1.8s"/>
    <path class="stitch" d="M182 0 q13 -14 26 0" style="animation-delay:2.1s"/>
  </g>

  <!-- yarn feed from the ball to the hook -->
  <path class="feed" d="M300 92 C 360 70, 430 116, 494 92"/>

  <!-- crochet hook (positioned by outer g, animated by inner g) -->
  <g transform="translate(266,80)">
    <g class="hook">
      <line x1="34" y1="34" x2="4" y2="4" class="thread"/>
      <path d="M4 4 q-11 -3 -6 -13 q4 -6 12 -1" class="thread"/>
    </g>
  </g>

  <!-- ball of yarn -->
  <g transform="translate(530,92)">
    <g class="ball">
      <circle r="30" fill="url(#yarn)"/>
      <path d="M-26 -9 A30 30 0 0 1 21 -21"  class="thread" stroke="#fff" opacity=".45"/>
      <path d="M-21 16 A30 30 0 0 1 27 7"    class="thread" stroke="#fff" opacity=".45"/>
      <path d="M-30 4 A30 30 0 0 0 25 -16"   class="thread" stroke="#fff" opacity=".35"/>
      <path d="M-12 -27 A30 30 0 0 1 18 23"  class="thread" stroke="#fff" opacity=".3"/>
    </g>
  </g>

  <!-- code line with blinking caret -->
  <text x="40" y="152" class="mono pink" font-size="19">while (rows--) chain();</text>
  <rect x="262" y="137" width="10" height="18" class="caret"/>
</svg>
