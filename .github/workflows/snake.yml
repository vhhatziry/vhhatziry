name: Generate Snake Animation

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Slow down snake animation
        # The snake SVG bakes its whole loop into a single duration (in ms);
        # frame offsets are percentages, so multiplying the ms slows it evenly.
        # SPEED_FACTOR = 2 -> half speed. Bump it up for an even slower crawl.
        env:
          SPEED_FACTOR: "2"
        run: |
          # snk runs in Docker as root, so dist/ is root-owned; take ownership
          # first or perl -i can't create its temp file.
          sudo chown -R "$(id -u):$(id -g)" dist
          for f in dist/*.svg; do
            perl -i -pe 's/(\d+)ms/int($1*$ENV{SPEED_FACTOR})."ms"/ge' "$f"
            echo "$f -> $(grep -o '[0-9]\+ms' "$f" | head -1)"
          done

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
